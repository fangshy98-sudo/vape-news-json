<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vape News JSON Preview</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }
    h1 {
      margin-bottom: 8px;
    }
    .meta {
      color: #666;
      margin-bottom: 24px;
    }
    .item {
      border-bottom: 1px solid #ddd;
      padding: 12px 0;
    }
    .title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .source {
      color: #666;
      font-size: 14px;
      margin-bottom: 4px;
    }
    a {
      color: #0969da;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    pre {
      background: #f6f8fa;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>新闻 JSON 预览页</h1>
  <div class="meta" id="meta">正在加载...</div>
  <div id="list"></div>

  <script>
    fetch("./news.json")
      .then(res => res.json())
      .then(data => {
        document.getElementById("meta").innerText =
          `状态：${data.status} | 条数：${data.count} | 生成时间：${data.generated_at_utc}`;

        const list = document.getElementById("list");
        list.innerHTML = "";

        (data.items || []).forEach(item => {
          const div = document.createElement("div");
          div.className = "item";
          div.innerHTML = `
            <div class="title">${item.title || ""}</div>
            <div class="source">${item.source || ""} ${item.pubDate || ""}</div>
            <div><a href="${item.link || "#"}" target="_blank">打开原文</a></div>
            <div>${item.description || ""}</div>
          `;
          list.appendChild(div);
        });
      })
      .catch(err => {
        document.getElementById("meta").innerText = "加载失败";
        document.getElementById("list").innerHTML = `<pre>${String(err)}</pre>`;
      });
  </script>
</body>
</html>
