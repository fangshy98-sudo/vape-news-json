name: Update news json

on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 * * *"

permissions:
  contents: write

jobs:
  build-news-json:
    runs-on: ubuntu-latest

    env:
      SOURCE_URL: "https://2first.fangshy98.workers.dev/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show SOURCE_URL
        run: echo "SOURCE_URL=${SOURCE_URL}"

      - name: Run fetch script
        run: python fetch_news.py

      - name: Show generated file
        run: |
          ls -lah docs || true
          cat docs/news.json || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/news.json
          git diff --cached --quiet || git commit -m "Update news.json"
          git push
